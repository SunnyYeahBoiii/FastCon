<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login - The Logical Architect</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-secondary-container": "#415382",
                        "surface-container-high": "#e6e8ea",
                        "on-tertiary-container": "#ffc6b2",
                        "surface-container-low": "#f2f4f6",
                        "surface-container": "#eceef0",
                        "primary-fixed-dim": "#b2c5ff",
                        "primary": "#003d9b",
                        "on-primary": "#ffffff",
                        "on-tertiary-fixed-variant": "#812800",
                        "on-primary-container": "#c4d2ff",
                        "outline-variant": "#c3c6d6",
                        "tertiary": "#7b2600",
                        "on-secondary-fixed": "#021945",
                        "inverse-primary": "#b2c5ff",
                        "on-primary-fixed": "#001848",
                        "background": "#f7f9fb",
                        "primary-fixed": "#dae2ff",
                        "inverse-surface": "#2d3133",
                        "tertiary-fixed-dim": "#ffb59b",
                        "primary-container": "#0052cc",
                        "surface-container-highest": "#e0e3e5",
                        "on-primary-fixed-variant": "#0040a2",
                        "inverse-on-surface": "#eff1f3",
                        "surface-container-lowest": "#ffffff",
                        "surface-bright": "#f7f9fb",
                        "secondary": "#4c5d8d",
                        "secondary-fixed": "#dae2ff",
                        "on-tertiary-fixed": "#380d00",
                        "tertiary-container": "#a33500",
                        "on-surface-variant": "#434654",
                        "outline": "#737685",
                        "surface-tint": "#0c56d0",
                        "on-surface": "#191c1e",
                        "surface-dim": "#d8dadc",
                        "secondary-fixed-dim": "#b4c5fb",
                        "on-tertiary": "#ffffff",
                        "tertiary-fixed": "#ffdbcf",
                        "on-secondary-fixed-variant": "#344573",
                        "surface": "#f7f9fb",
                        "on-error-container": "#93000a",
                        "on-background": "#191c1e",
                        "surface-variant": "#e0e3e5",
                        "error": "#ba1a1a",
                        "on-error": "#ffffff",
                        "error-container": "#ffdad6",
                        "secondary-container": "#b6c8fe",
                        "on-secondary": "#ffffff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "fontFamily": {
                        "headline": ["Be Vietnam Pro", "sans-serif"],
                        "body": ["Be Vietnam Pro", "sans-serif"],
                        "label": ["Be Vietnam Pro", "sans-serif"]
                    }
                }
            }
        }
    </script>
<style>
        body {
            font-family: 'Be Vietnam Pro', sans-serif;
            background-color: theme('colors.surface');
            color: theme('colors.on-surface');
        }
        .btn-primary {
            background: linear-gradient(135deg, theme('colors.primary'), theme('colors.primary-container'));
            color: theme('colors.on-primary');
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="min-h-screen flex flex-col antialiased">
<main class="flex-grow flex items-center justify-center p-6 bg-surface">
<div class="w-full max-w-md bg-surface-container-lowest p-8 md:p-10 rounded-xl shadow-[0_24px_40px_-15px_rgba(25,28,30,0.06)] relative z-10">
<div class="mb-10 text-center">
<h1 class="text-3xl font-headline font-bold text-on-surface tracking-tight">Sign In</h1>
<p class="text-on-surface-variant mt-2 text-sm">Enter your credentials to access the workspace.</p>
</div>
<form action="#" class="space-y-6" method="POST">
<div class="space-y-1.5">
<label class="block text-sm font-medium text-on-surface" for="username">Username or Email</label>
<input class="w-full bg-surface-container-highest border-0 rounded text-on-surface placeholder-outline focus:ring-0 focus:bg-surface-container-lowest focus:border-b-2 focus:border-primary transition-all duration-200 px-4 py-3" id="username" name="username" placeholder="Enter your username or email" required="" type="text"/>
</div>
<div class="space-y-1.5">
<div class="flex items-center justify-between">
<label class="block text-sm font-medium text-on-surface" for="password">Password</label>
<a class="text-sm font-medium text-primary hover:text-primary-container transition-colors" href="#">Forgot password?</a>
</div>
<input class="w-full bg-surface-container-highest border-0 rounded text-on-surface placeholder-outline focus:ring-0 focus:bg-surface-container-lowest focus:border-b-2 focus:border-primary transition-all duration-200 px-4 py-3" id="password" name="password" placeholder="Enter your password" required="" type="password"/>
</div>
<div class="pt-4">
<button class="w-full btn-primary font-medium rounded py-3 px-4 flex justify-center items-center hover:opacity-90 transition-opacity focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 focus:ring-offset-surface" type="submit">
                        Login
                    </button>
</div>
</form>
</div>
<!-- Ambient decorative elements -->
<div class="fixed top-0 left-0 w-full h-full overflow-hidden pointer-events-none -z-10">
<div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] rounded-full bg-surface-container-low blur-[100px] opacity-70"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] rounded-full bg-primary-fixed-dim blur-[120px] opacity-20"></div>
</div>
</main>
</body></html>
